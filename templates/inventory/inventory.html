{% extends 'base/base.html' %}
{% load static %}

{% block main_content %}

<style>

.inventory-wrapper{
    padding:24px;
}

.inventory-card{
    max-width:900px;
    margin:auto;

    background:var(--bg-card);

    border:1px solid var(--border);

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.inventory-header{
    padding:28px;

    background:
        linear-gradient(
            135deg,
            #6366f1,
            #4f46e5
        );

    color:#fff;
}

.inventory-header h2{
    font-size:28px;
    font-weight:800;
}

.inventory-body{
    padding:28px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.full-width{
    grid-column:span 2;
}

.form-group label{
    margin-bottom:8px;
    font-weight:600;
    color:var(--text-main);
}

.form-group input{
    width:100%;

    padding:14px 16px;

    border-radius:14px;

    border:1px solid var(--border);

    background:var(--bg-main);

    color:var(--text-main);

    transition:.25s ease;
}

.form-group input:focus{
    outline:none;

    border-color:#6366f1;

    box-shadow:
        0 0 0 4px rgba(99,102,241,0.12);
}

.submit-btn{
    width:100%;

    margin-top:24px;

    border:none;

    padding:15px;

    border-radius:16px;

    font-weight:700;

    color:#fff;

    background:
        linear-gradient(
            135deg,
            #6366f1,
            #4f46e5
        );

    transition:.25s ease;
}

.submit-btn:hover{
    transform:translateY(-2px);
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:span 1;
    }
}

</style>

<div class="content-wrapper">

<section class="content inventory-wrapper">

<div class="inventory-card">

    <div class="inventory-header">

        <h2>
            {% if queryset %}
                Update Inventory
            {% else %}
                Add Inventory
            {% endif %}
        </h2>

    </div>

    <div class="inventory-body">

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group">
                    <label>Product Name</label>
                    {{ form.product_name }}
                </div>

                <div class="form-group">
                    <label>Stock Quantity</label>
                    {{ form.stock_quantity }}
                </div>

                <div class="form-group">
                    <label>Cost Price</label>
                    {{ form.cost_price }}
                </div>

                <div class="form-group">
                    <label>Selling Price</label>
                    {{ form.selling_price }}
                </div>

                <div class="form-group">
                    <label>Product Image</label>
                    {{ form.image }}
                </div>

            </div>

            <button type="submit" class="submit-btn">

                <i class="fas fa-save me-2"></i>

                Save Inventory

            </button>

        </form>

    </div>

</div>

</section>

</div>

{% endblock %}
