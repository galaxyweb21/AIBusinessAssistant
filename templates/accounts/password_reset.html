{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

{% include 'base/header.html' %}

<style>

:root{
    --primary:#6366f1;
    --primary-dark:#4f46e5;

    --bg:#020617;
    --card:#0f172a;

    --border:rgba(255,255,255,0.08);

    --text:#f8fafc;
    --muted:#94a3b8;
}

body{
    margin:0;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top right,
        rgba(99,102,241,0.16),
        transparent 30%),

        linear-gradient(
            135deg,
            #020617,
            #0f172a
        );

    font-family:'Inter',sans-serif;
}

.auth-wrapper{
    width:100%;
    max-width:460px;
    padding:20px;
}

.auth-card{
    background:rgba(15,23,42,0.92);

    border:1px solid var(--border);

    border-radius:28px;

    padding:42px;

    box-shadow:
        0 25px 60px rgba(0,0,0,0.45);

    animation:fadeUp .5s ease;
}

.auth-icon{
    width:86px;
    height:86px;

    margin:auto auto 24px;

    border-radius:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    font-size:34px;
}

.auth-title{
    text-align:center;

    color:#fff;

    font-size:30px;
    font-weight:800;

    margin-bottom:12px;
}

.auth-text{
    text-align:center;

    color:var(--muted);

    line-height:1.7;

    margin-bottom:30px;
}

.input-wrapper{
    position:relative;
    margin-bottom:24px;
}

.input-wrapper i{
    position:absolute;

    left:18px;
    top:50%;

    transform:translateY(-50%);

    color:#94a3b8;
}

.auth-input{
    width:100%;
    height:56px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.08);

    background:#111827;

    color:#fff;

    padding:0 18px 0 50px;

    transition:all .25s ease;
}

.auth-input:focus{
    outline:none;

    border-color:var(--primary);

    box-shadow:
        0 0 0 4px rgba(99,102,241,0.15);
}

.auth-btn{
    width:100%;
    height:56px;

    border:none;

    border-radius:18px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    font-weight:700;

    transition:all .25s ease;
}

.auth-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 14px 30px rgba(99,102,241,0.35);
}

.auth-footer{
    margin-top:22px;
    text-align:center;
}

.auth-footer a{
    color:#c7d2fe;
    text-decoration:none;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-icon">
            <i class="fas fa-key"></i>
        </div>

        <div class="auth-title">
            Forgot Password?
        </div>

        <div class="auth-text">
            Enter your email address and we’ll send you instructions to reset your password.
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="input-wrapper">

                <i class="fas fa-envelope"></i>

                <input
                    type="email"
                    name="email"
                    class="auth-input"
                    placeholder="Enter your email"
                    required>

            </div>

            <button type="submit" class="auth-btn">

                <i class="fas fa-paper-plane me-2"></i>
                Send Reset Link

            </button>

        </form>

        <div class="auth-footer">

            <a href="{% url 'user-login' %}">
                ← Back to Login
            </a>

        </div>

    </div>

</div>

{% include 'base/js.html' %}
</body>
</html>
