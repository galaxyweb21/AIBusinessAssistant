{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logged Out</title>

{% include 'base/header.html' %}

<style>

:root{
    --primary:#6366f1;
    --primary-dark:#4f46e5;

    --bg:#020617;
    --card:#0f172a;

    --border:rgba(255,255,255,0.08);

    --text:#f8fafc;
    --muted:#94a3b8;
}

body{
    margin:0;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top right,
        rgba(99,102,241,0.15),
        transparent 30%),

        linear-gradient(
            135deg,
            #020617,
            #0f172a
        );

    font-family:'Inter',sans-serif;
}

.logout-card{

    width:100%;
    max-width:450px;

    background:rgba(15,23,42,0.92);

    border:1px solid var(--border);

    border-radius:28px;

    padding:45px;

    text-align:center;

    box-shadow:
        0 25px 60px rgba(0,0,0,0.45);

    animation:fadeUp .5s ease;
}

.logout-icon{
    width:90px;
    height:90px;

    margin:auto auto 24px;

    border-radius:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        linear-gradient(
            135deg,
            #ef4444,
            #dc2626
        );

    color:#fff;

    font-size:36px;
}

.logout-title{
    color:#fff;
    font-size:30px;
    font-weight:800;

    margin-bottom:10px;
}

.logout-text{
    color:var(--muted);

    margin-bottom:30px;

    line-height:1.7;
}

.logout-btn{
    width:100%;
    height:56px;

    border:none;

    border-radius:18px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            var(--primary-dark)
        );

    color:#fff;

    font-weight:700;

    transition:all .25s ease;
}

.logout-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 14px 30px rgba(99,102,241,0.35);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="logout-card">

    <div class="logout-icon">
        <i class="fas fa-sign-out-alt"></i>
    </div>

    <div class="logout-title">
        Logged Out
    </div>

    <div class="logout-text">
        You have successfully logged out of your business account.
    </div>

    <a href="{% url 'user-login' %}">

        <button class="logout-btn">

            <i class="fas fa-arrow-right me-2"></i>
            Login Again

        </button>

    </a>

</div>

{% include 'base/js.html' %}
</body>
</html>
