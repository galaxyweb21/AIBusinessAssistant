{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Sent</title>

{% include 'base/header.html' %}

<style>

:root{
    --primary:#6366f1;
    --primary-dark:#4f46e5;

    --bg:#020617;
    --card:#0f172a;

    --border:rgba(255,255,255,0.08);

    --text:#f8fafc;
    --muted:#94a3b8;
}

body{
    margin:0;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top right,
        rgba(99,102,241,0.16),
        transparent 30%),

        linear-gradient(
            135deg,
            #020617,
            #0f172a
        );

    font-family:'Inter',sans-serif;
}

.done-card{
    width:100%;
    max-width:460px;

    background:rgba(15,23,42,0.92);

    border:1px solid var(--border);

    border-radius:28px;

    padding:45px;

    text-align:center;

    box-shadow:
        0 25px 60px rgba(0,0,0,0.45);

    animation:fadeUp .5s ease;
}

.done-icon{
    width:90px;
    height:90px;

    margin:auto auto 24px;

    border-radius:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        linear-gradient(
            135deg,
            #10b981,
            #059669
        );

    color:#fff;

    font-size:36px;
}

.done-title{
    color:#fff;
    font-size:30px;
    font-weight:800;

    margin-bottom:10px;
}

.done-text{
    color:#94a3b8;

    line-height:1.8;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="done-card">

    <div class="done-icon">
        <i class="fas fa-envelope"></i>
    </div>

    <div class="done-title">
        Email Sent
    </div>

    <div class="done-text">
        Password reset instructions have been sent to your email address.
    </div>

</div>

{% include 'base/js.html' %}
</body>
</html>
