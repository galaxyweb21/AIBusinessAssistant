{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Business ERP</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
      href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">

<style>
:root{
    --primary:#6366f1;
    --primary-dark:#4f46e5;

    --bg-main:#020617;
    --bg-card:#0f172a;
    --bg-soft:#111827;

    --text-main:#f8fafc;
    --text-muted:#94a3b8;

    --border:rgba(255,255,255,0.08);
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter', sans-serif;
    background:
        radial-gradient(circle at top left,
        rgba(99,102,241,0.15),
        transparent 28%),

        radial-gradient(circle at bottom right,
        rgba(59,130,246,0.12),
        transparent 25%),

        var(--bg-main);

    color:var(--text-main);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

/* WRAPPER */
.auth-wrapper{
    width:100%;
    max-width:1100px;

    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:28px;

    overflow:hidden;
    display:flex;

    box-shadow:0 25px 60px rgba(0,0,0,0.45);
    animation:fadeUp .5s ease;
}

/* LEFT PANEL */
.auth-left{
    width:42%;
    padding:70px 55px;
    background:linear-gradient(135deg,
        rgba(99,102,241,0.95),
        rgba(79,70,229,0.95));
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.auth-left h1{
    font-size:40px;
    font-weight:800;
    margin-bottom:18px;
}

.auth-left p{
    color:rgba(255,255,255,0.85);
    line-height:1.8;
    font-size:15px;
    max-width:420px;
}

/* RIGHT PANEL */
.auth-right{
    width:58%;
    padding:55px;
}

.auth-title{
    margin-bottom:35px;
}

.auth-title h3{
    font-size:34px;
    font-weight:800;
    margin-bottom:10px;
    color:var(--text-main);
}

.auth-title p{
    color:var(--text-muted);
}

/* FORM */
.form-group{
    margin-bottom:18px;
    display:flex;
    flex-direction:column;
}

.form-control{
    height:52px;
    border-radius:16px;
    border:1px solid var(--border);
    background:var(--bg-soft);
    color:var(--text-main);
    padding:0 16px;
    font-size:14px;
    transition:all .25s ease;
}

.form-control:focus{
    outline:none;
    border-color:var(--primary);
    background:#111827;
    box-shadow:0 0 0 4px rgba(99,102,241,0.15);
}

/* BUTTON */
.auth-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:all .25s ease;
    box-shadow:0 12px 30px rgba(99,102,241,0.25);
}

.auth-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 38px rgba(99,102,241,0.35);
}

/* FOOTER */
.auth-footer{
    margin-top:24px;
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
}

.auth-footer a{
    color:#818cf8;
    text-decoration:none;
    font-weight:700;
}

/* ANIMATION */
@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:991px){
    .auth-left{display:none;}
    .auth-right{width:100%;padding:35px 24px;}
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <!-- LEFT -->
    <div class="auth-left">
        <h1>Business ERP</h1>
        <p>
            Enterprise business management system
            for hotels, pharmacies, schools,
            inventory, accounting and AI analytics.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">

        <div class="auth-title">
            <h3>Welcome Back</h3>
            <p>Login to continue</p>
        </div>

        {% include 'partials/_alerts.html' %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Username"
                       required>
            </div>

            <div class="form-group">
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt me-2"></i>
                Login
            </button>
        </form>

        <div class="auth-footer">
            Don't have a business account?
            <a href="{% url 'register_business' %}">
                Register Here
            </a>
        </div>

    </div>

</div>

</body>
</html>
