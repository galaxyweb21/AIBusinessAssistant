<style>
/* ===============================
   🎯 DESIGN SYSTEM (CLEAN BASE)
================================= */
:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;

    --radius: 10px;
    --transition: all 0.25s ease;

    /* LIGHT MODE */
    --bg-main: #f8fafc;
    --bg-card: #ffffff;
    --bg-navbar: #ffffff;
    --bg-sidebar: #0f172a;

    --text-main: #0f172a;
    --text-muted: #64748b;

    --border: #e5e7eb;
    --hover-bg: #f1f5f9;

    /* CHAT */
    --chat-bg: #f8fafc;
    --chat-user: #6366f1;
    --chat-ai: #e5e7eb;
    --chat-text-user: #ffffff;
    --chat-text-ai: #0f172a;
}

/* ===============================
   🌙 DARK MODE
================================= */
.dark-mode {
    --bg-main: #0b1220;
    --bg-card: #111827;
    --bg-navbar: rgba(2,6,23,0.9);
    --bg-sidebar: #020617;

    --text-main: #e5e7eb;
    --text-muted: #94a3b8;

    --border: rgba(255,255,255,0.08);
    --hover-bg: rgba(255,255,255,0.05);

    /* CHAT */
    --chat-bg: #0f172a;
    --chat-user: #6366f1;
    --chat-ai: #1f2937;
    --chat-text-user: #ffffff;
    --chat-text-ai: #e5e7eb;
}

/* ===============================
   GLOBAL LAYOUT
================================= */
html, body {
    height: 100%;
}

body,
.wrapper,
.content-wrapper {
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
}

.wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.content-wrapper {
    flex: 1;
    padding-bottom: 20px;
}
/* =========================================
   GLOBAL INPUT DARK MODE FIX (CRITICAL)
========================================= */

/* ALL INPUTS ALWAYS FOLLOW THEME */
input,
select,
textarea{
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
    border: 1px solid var(--border);
}

/* FOCUS STATE */
input:focus,
select:focus,
textarea:focus{
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
}

/* 🔥 FIX AFTER USER TYPES (MOST IMPORTANT PART) */
input:not(:placeholder-shown),
textarea:not(:placeholder-shown){
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
}

/* 🔥 CHROME AUTOFILL FIX (WHITE BACKGROUND BUG) */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
textarea:-webkit-autofill,
select:-webkit-autofill{
    -webkit-box-shadow: 0 0 0 1000px var(--bg-main) inset !important;
    -webkit-text-fill-color: var(--text-main) !important;
    transition: background-color 9999s ease-in-out 0s;
}

/* DARK MODE HARD ENFORCEMENT */
body.dark-mode input,
body.dark-mode select,
body.dark-mode textarea{
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
    border-color: var(--border);
}

/* =========================================
   DARK MODE MODAL THEME FIX (GLOBAL)
========================================= */

/* Modal overlay */
.modal-backdrop.show {
    background: rgba(0,0,0,0.65);
}

/* Main modal box */
.modal-content {
    background: var(--bg-card) !important;
    color: var(--text-main) !important;
    border: 1px solid var(--border) !important;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}

/* Header */
.modal-header {
    background: var(--bg-card) !important;
    border-bottom: 1px solid var(--border) !important;
    color: var(--text-main) !important;
}

/* Body */
.modal-body {
    background: var(--bg-card) !important;
    color: var(--text-main) !important;
}

/* Footer */
.modal-footer {
    background: var(--bg-card) !important;
    border-top: 1px solid var(--border) !important;
}

/* Close button (X) */
.modal-header .close {
    color: var(--text-main) !important;
    opacity: 0.7;
}

.modal-header .close:hover {
    opacity: 1;
}

/* Inputs inside modal (VERY IMPORTANT) */
.modal .form-control,
.modal input,
.modal textarea,
.modal select {
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
    border: 1px solid var(--border) !important;
    border-radius: 12px;
}

/* Focus state */
.modal .form-control:focus,
.modal input:focus,
.modal textarea:focus,
.modal select:focus {
    border-color: #6366f1 !important;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.15) !important;
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
}

/* Buttons inside modal */
.modal .btn {
    border-radius: 12px;
}

/* Secondary button */
.modal .btn-secondary {
    background: var(--bg-main);
    color: var(--text-main);
    border: 1px solid var(--border);
}

/* Danger button */
.modal .btn-danger {
    background: rgba(239,68,68,0.15);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,0.3);
}

/* Primary button */
.modal .btn-primary {
    background: linear-gradient(135deg,#6366f1,#4f46e5);
    border: none;
}

/* Fix weird Bootstrap white fade on open */
.modal-open .modal {
    backdrop-filter: blur(6px);
}

/* =========================================
   GLOBAL INPUT UNIFORMITY FIX (ALL PAGES)
========================================= */

/* Force all inputs to match enterprise UI */
.form-control,
input[type="text"],
input[type="email"],
input[type="password"],
input[type="number"],
textarea,
select {
    height: 52px;
    border-radius: 14px !important;

    border: 1px solid var(--border) !important;
    background: var(--bg-main) !important;
    color: var(--text-main) !important;

    padding: 0 14px !important;

    font-size: 14px;
    font-weight: 500;

    transition: .2s ease;
}

/* Textarea override (important) */
textarea.form-control,
textarea {
    height: auto !important;
    min-height: 120px;
    padding: 12px 14px !important;
}

/* Focus state (consistent across app) */
.form-control:focus,
input:focus,
textarea:focus,
select:focus {
    outline: none !important;
    border-color: #6366f1 !important;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.15) !important;
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
}

/* Prevent Bootstrap shrinking inside modals */
.modal .form-control,
.modal input,
.modal textarea,
.modal select {
    height: 52px !important;
    font-size: 14px !important;
}

/* Fix Bootstrap small input groups */
.input-group .form-control {
    height: 52px !important;
}

/* Dark mode safety */
body.dark-mode .form-control,
body.dark-mode input,
body.dark-mode textarea,
body.dark-mode select {
    background: var(--bg-main) !important;
    color: var(--text-main) !important;
    border-color: var(--border) !important;
}
/* ===============================
   NAVBAR FIX
================================= */
.main-header {
    background: var(--bg-navbar) !important;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

.main-header i,
.main-header .nav-link {
    color: var(--text-main) !important;
}

/* ===============================
   SIDEBAR
================================= */
.main-sidebar {
    background: var(--bg-sidebar) !important;
}

.nav-sidebar .nav-link {
    color: #cbd5e1 !important;
    border-radius: 8px;
    margin: 4px 10px;
    padding: 10px 14px;
}

.nav-sidebar .nav-link:hover {
    background: rgba(99,102,241,0.15);
    color: #fff !important;
}

.nav-sidebar .nav-link.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important;
    color: #fff !important;
}
/* ===============================
   KPI CARDS (FIXED + PROFESSIONAL)
================================= */
.kpi-card {
    position: relative;
    padding: 16px 18px;
    border-radius: 12px;

    background: linear-gradient(145deg, var(--bg-card), var(--bg-main));
    border: 1px solid var(--border);

    width: 100%;              /* ✅ FIX WIDTH */
    min-height: 110px;

    display: flex;
    flex-direction: column;
    justify-content: center;

    overflow: hidden;
    transition: var(--transition);
}

/* 🔥 IMPORTANT: fix flex stretch from parent */
.col-lg-3 .kpi-card,
.col-6 .kpi-card {
    flex: 1;
}

/* HOVER */
.kpi-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ICON */
.kpi-icon {
    position: absolute;
    right: 14px;
    top: 14px;

    font-size: 18px;
    opacity: 0.12;
}

/* LABEL */
.kpi-card small {
    font-size: 12px;
    color: var(--text-muted);
}

/* VALUE */
.kpi-card h3 {
    font-size: 24px;
    font-weight: 700;
    margin-top: 6px;
    color: var(--text-main);
}

/* ===============================
   KPI COLOR VARIANTS
================================= */

.kpi-revenue{
    border-left:4px solid #10b981;
}

.kpi-profit{
    border-left:4px solid #3b82f6;
}

.kpi-expense{
    border-left:4px solid #ef4444;
}

.kpi-net{
    border-left:4px solid #f59e0b;
}


/* NEW ERP COLORS */

.kpi-blue{
    border-left:4px solid #3b82f6;
}

.kpi-green{
    border-left:4px solid #10b981;
}

.kpi-purple{
    border-left:4px solid #8b5cf6;
}

.kpi-red{
    border-left:4px solid #ef4444;
}

.kpi-orange{
    border-left:4px solid #f59e0b;
}


/* subtle icon coloring */

.kpi-blue .kpi-icon{
    color:#3b82f6;
}

.kpi-green .kpi-icon{
    color:#10b981;
}

.kpi-purple .kpi-icon{
    color:#8b5cf6;
}

.kpi-red .kpi-icon{
    color:#ef4444;
}

.kpi-orange .kpi-icon{
    color:#f59e0b;
}

/* SUBTLE ANIMATION */
.kpi-card {
    animation: kpiFade 0.4s ease;
}

@keyframes kpiFade {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
/* ===============================
   CARDS
================================= */
.card {
    background: var(--bg-card) !important;
    border-radius: var(--radius);
    border: 1px solid var(--border);
}

/* ===============================
   FORM INPUTS
================================= */
.form-control {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-main);
    transition: var(--transition);
}

.form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
}

/* ===============================
   BUTTON
================================= */
.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
}


/* ===============================
   THEME TOGGLE
================================= */
.theme-toggle-btn {
    background: transparent !important;
    border: none;
    cursor: pointer;
}

#themeIcon {
    font-size: 16px;
    transition: all 0.4s ease;
}

:not(.dark-mode) #themeIcon {
    color: #0f172a;
}

.dark-mode #themeIcon {
    color: #facc15;
    transform: rotate(180deg);
}


/* ===============================
   FOOTER
================================= */
.main-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;

    padding: 12px 20px;
    margin-top: auto;

    border-top: 1px solid var(--border);
    background: var(--bg-card);

    color: var(--text-muted);
    font-size: 13px;

    transition: var(--transition);
}

.footer-left,
.footer-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.footer-company {
    color: var(--text-main);
    font-weight: 500;
}

.footer-version {
    color: var(--text-muted);
    font-size: 12px;
}

/* STATUS */
.system-status {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
}

.status-dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    position: relative;
}

.status-dot::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 1.5s infinite;
}

/* DARK MODE DEPTH */
.dark-mode .main-footer {
    background: #020617;
}


/* ===============================
   AVATAR
================================= */
.avatar-container {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===============================
   🚀 CHAT BOX
================================= */
.chat-box {
    height: 360px;
    overflow-y: auto;
    padding: 14px;

    background: var(--chat-bg);
    border: 1px solid var(--border);
    border-radius: 14px;

    display: flex;
    flex-direction: column;
    gap: 10px;
}

.chat-msg {
    max-width: 75%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.4;
    border-radius: 14px;
}

.chat-user {
    align-self: flex-end;
    background: var(--chat-user);
    color: var(--chat-text-user);
}

.chat-ai {
    align-self: flex-start;
    background: var(--chat-ai);
    color: var(--chat-text-ai);
}

/* ===============================
   🚀 CHAT INPUT
================================= */
.chat-input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;

    margin-top: 10px;
    padding: 8px;

    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg-card);
}

.chat-input-wrapper:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
}

.chat-input-field {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text-main);
    font-size: 14px;
}

.chat-send-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    cursor: pointer;
}

.chat-clear-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--danger), var(--primary-dark));
    color: #fff;
    cursor: pointer;
}

/* ===============================
   🔥 FIXED CHART SYSTEM (IMPORTANT)
   THIS FIXES YOUR BROKEN COLUMNS
================================= */

/* FORCE ALL CHART CARDS SAME HEIGHT */
/* ===============================
   🔥 FINAL CHART HEIGHT FIX (HARD CONSTRAINT)
================================= */

.chart-card {
    height: 380px !important;
    display: flex;
    flex-direction: column;
}

/* FORCE BODY TO RESPECT HEIGHT LIMIT */
.chart-card .card-body {
    flex: 1;
    position: relative;
    height: 100%;
    min-height: 0;   /* 🔥 CRITICAL FIX */
    overflow: hidden;
}

/* 🔥 THIS IS THE REAL FIX */
.chart-container {
    position: relative;
    height: 100% !important;
    width: 100%;
}

/* CANVAS MUST BE ABSOLUTE FIT */
.chart-container canvas {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
}

/* ===============================
   ✨ FADE UP ANIMATION
================================= */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(12px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===============================
   🚀 FULL WIDTH ENTERPRISE DASHBOARD
================================= */

.dashboard-container {
    padding: 20px 28px;
    max-width: 100%;
}

/* Remove Bootstrap container squeezing */
.container-fluid {
    max-width: 100% !important;
}

/* give breathing space */
.content-header {
    padding: 10px 0;
}
/* ===============================
   GRID FIX (PREVENT COLUMN BREAK)
================================= */
.row.g-3 {
    align-items: stretch;
}

/* ENSURE COLS MATCH HEIGHT */
.col-lg-6, .col-lg-3, .col-6 {
    display: flex;
}

/* CARD FULL HEIGHT IN COLUMN */
.col-lg-6 .card,
.col-lg-3 .card,
.col-6 .card {
    width: 100%;
}

/* ===============================
   TABLE
================================= */
.table {
    color: var(--text-main) !important;
}

.table td, .table th {
    border-color: var(--border) !important;
}

/* ===============================
   ANIMATION
================================= */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===============================
   RESPONSIVE
================================= */
@media (max-width: 576px) {

    .chat-msg {
        max-width: 90%;
    }

    .chart-card {
        height: 320px;
    }
}
